<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chivo:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Frontend Mentor | Pod request access landing page</title>
  </head>
  <body>
    <div class="overlay"></div>
    <div class="access">
      <img src="./assets/desktop/logo.svg" alt="logo" class="access__logo" />
      <h1 class="access__title">
        PUBLISH YOUR PODCASTS <span>EVERYWHERE.</span>
      </h1>
      <p class="access__text">
        Upload your audio to Pod with a single click. We’ll then distribute your
        podcast to Spotify, Apple Podcasts, Google Podcasts, Pocket Casts and
        more!
      </p>
      <div class="access__partners">
        <img src="./assets/desktop/spotify.svg" alt="spotify brand logo" />
        <img src="./assets/desktop/apple.svg" alt="apple brand logo" />
        <img
          src="./assets/desktop/google.svg"
          alt="google brand logo"
        />
        <img src="./assets/desktop/pocket.svg" alt="pocket brand logo" />
      </div>
      <form action="https://www.randomserver.com" method="post">
        <input type="email" name="email" id="email" class="access__mail" placeholder="Email address" required/>
        <button type="submit" class="access__submit">Request Access</button>
      </form>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
